<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dishwasher Status</title>
<style>
  :root { --teal: #007A73; --dirty: #B3441E; --ink: #231F20; }
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 40px 20px;
    background: #F2F5F4;
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", sans-serif;
  }
  button {
    width: min(70vw, 280px);
    height: min(70vw, 280px);
    border-radius: 50%;
    border: none;
    background: var(--teal);
    color: #fff;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.03em;
  }
  button.dirty { background: var(--dirty); }
  button span {
    display: block;
    font-size: 13px;
    font-weight: 500;
    opacity: 0.85;
    margin-top: 6px;
  }
  ul {
    list-style: none;
    width: 100%;
    max-width: 320px;
  }
  li {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 13.5px;
    padding: 8px 0;
    border-top: 1px solid #E1E6E5;
  }
  li:first-child { border-top: none; }
  time { color: #8a908f; white-space: nowrap; }
</style>
</head>
<body>
  <button id="status">Loading…</button>
  <ul id="log"></ul>

<script>
  const btn = document.getElementById('status');
  const log = document.getElementById('log');
  const BUCKET = 'H5XU7fU9gPbQFcfx1857Ts';
  const STATUS_URL = `https://kvdb.io/${BUCKET}/dishwasher_status`;
  const LOG_URL = `https://kvdb.io/${BUCKET}/dishwasher_log`;

  const getName = () =>
    localStorage.getItem('name') ||
    (localStorage.setItem('name', prompt("What's your name?") || 'Someone'), localStorage.getItem('name'));

  function render(state) {
    btn.className = state;
    btn.innerHTML = state === 'clean'
      ? 'CLEAN<span>Tap if you loaded it dirty</span>'
      : 'DIRTY<span>Tap once it\'s clean</span>';
  }

  function renderLog(entries) {
    log.innerHTML = entries.slice().reverse().map(e => `
      <li>${e.who} marked it ${e.status}
        <time>${new Date(e.t).toLocaleString([], {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'})}</time>
      </li>`).join('');
  }

  async function load() {
    const [status, logText] = await Promise.all([
      fetch(STATUS_URL).then(r => r.ok ? r.text() : 'dirty').catch(() => 'dirty'),
      fetch(LOG_URL).then(r => r.ok ? r.text() : '[]').catch(() => '[]'),
    ]);
    render(status.trim() || 'dirty');
    renderLog(logText.trim() ? JSON.parse(logText) : []);
  }

  async function toggle() {
    const current = btn.className;
    const next = current === 'clean' ? 'dirty' : 'clean';
    render(next);
    try {
      await fetch(STATUS_URL, { method: 'POST', body: next });
      const entries = JSON.parse((await fetch(LOG_URL).then(r => r.ok ? r.text() : '[]')) || '[]');
      entries.push({ who: getName(), status: next, t: Date.now() });
      await fetch(LOG_URL, { method: 'POST', body: JSON.stringify(entries.slice(-15)) });
      renderLog(entries.slice(-15));
    } catch (e) {
      render(current);
    }
  }

  btn.addEventListener('click', toggle);
  load();
</script>
</body>
</html>
