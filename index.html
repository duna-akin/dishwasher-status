<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dishwasher Status</title>
<style>
  :root {
    --clean: #2f7a5f;
    --dirty: #a8452f;
    --bg: #14161a;
    --text: #f4f1ea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  button#status {
    width: min(88vw, 420px);
    height: min(88vw, 420px);
    border-radius: 50%;
    border: none;
    color: var(--text);
    font-size: clamp(28px, 8vw, 44px);
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background-color 0.25s ease, transform 0.1s ease;
    box-shadow: 0 0 0 8px rgba(255,255,255,0.04);
  }
  button#status:active {
    transform: scale(0.97);
  }
  button#status.clean { background: var(--clean); }
  button#status.dirty { background: var(--dirty); }
  #sub {
    display: block;
    margin-top: 14px;
    font-size: 15px;
    font-weight: 400;
    opacity: 0.75;
  }
  #hint {
    position: fixed;
    bottom: 24px;
    color: var(--text);
    opacity: 0.4;
    font-size: 13px;
    font-family: -apple-system, sans-serif;
  }
</style>
</head>
<body>
  <button id="status" class="dirty">
    Loading…
  </button>
  <div id="hint">Tap to change</div>

<script>
  const btn = document.getElementById('status');
  const BUCKET_ID = 'H5XU7fU9gPbQFcfx1857Ts';
  const URL = `https://kvdb.io/${BUCKET_ID}/dishwasher_status`;

  function render(state) {
    if (state === 'clean') {
      btn.className = 'clean';
      btn.innerHTML = 'CLEAN<span id="sub">tap if you loaded it dirty</span>';
    } else {
      btn.className = 'dirty';
      btn.innerHTML = 'DIRTY<span id="sub">tap once it\'s clean</span>';
    }
  }

  async function load() {
    try {
      const res = await fetch(URL);
      const text = res.ok ? await res.text() : 'dirty';
      render(text.trim() || 'dirty');
    } catch (e) {
      render('dirty');
    }
  }

  async function toggle() {
    const current = btn.classList.contains('clean') ? 'clean' : 'dirty';
    const next = current === 'clean' ? 'dirty' : 'clean';
    render(next); // optimistic
    try {
      await fetch(URL, { method: 'POST', body: next });
    } catch (e) {
      render(current); // revert on failure
    }
  }

  btn.addEventListener('click', toggle);
  load();
</script>
</body>
</html>
